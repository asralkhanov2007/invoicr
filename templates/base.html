<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Invoicr{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    code, .mono { font-family: 'DM Mono', monospace; }

    :root {
      --sidebar-w: 220px;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: #0f172a;
      display: flex;
      flex-direction: column;
      z-index: 40;
      transition: transform 0.25s ease;
    }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 30;
    }
    .main-content {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main-content { margin-left: 0; }
      .mobile-header { display: flex !important; }
    }

    /* Nav links */
    .nav-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: #94a3b8;
      transition: all 0.15s;
      margin: 2px 0;
    }
    .nav-link:hover { background: rgba(255,255,255,0.06); color: #e2e8f0; }
    .nav-link.active { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .nav-link svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* Top header */
    .top-header {
      height: 64px;
      background: white;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    /* Cards */
    .stat-card {
      background: white;
      border: 1px solid #f1f5f9;
      border-radius: 16px;
      padding: 20px 24px;
      transition: box-shadow 0.2s;
    }
    .stat-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-paid    { background: #dcfce7; color: #15803d; }
    .badge-sent    { background: #dbeafe; color: #1d4ed8; }
    .badge-overdue { background: #fee2e2; color: #b91c1c; }
    .badge-draft   { background: #f1f5f9; color: #64748b; }
    .badge-cancelled { background: #f1f5f9; color: #64748b; }

    /* Message toasts */
    .toast-success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .toast-error   { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .toast-info    { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
      background: #f8fafc;
      border-bottom: 1px solid #f1f5f9;
    }
    .data-table td {
      padding: 14px 16px;
      font-size: 14px;
      color: #334155;
      border-bottom: 1px solid #f8fafc;
    }
    .data-table tr:hover td { background: #fafbff; }
    .data-table tr:last-child td { border-bottom: none; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
  </style>
</head>
