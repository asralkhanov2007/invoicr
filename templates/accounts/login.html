{% extends 'base.html' %}
{% block title %}Login — Invoicr{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow w-full max-w-md">

    <h1 class="text-2xl font-semibold mb-1">Welcome back</h1>
    <p class="text-gray-500 text-sm mb-6">Sign in to your Invoicr account</p>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      {% for field in form %}
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            {{ field.label }}
          </label>
          <input
            type="{{ field.field.widget.input_type }}"
            name="{{ field.html_name }}"
            id="{{ field.id_for_label }}"
            {% if field.value %}value="{{ field.value }}"{% endif %}
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
          {% if field.errors %}
            <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
          {% endif %}
        </div>
      {% endfor %}

      <button type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm
               font-medium hover:bg-blue-700 transition">
        Sign in
      </button>
    </form>

    <p class="text-sm text-center text-gray-500 mt-4">
      No account?
      <a href="{% url 'register' %}" class="text-blue-600 hover:underline">Register</a>
    </p>

  </div>
</div>
{% endblock %}
