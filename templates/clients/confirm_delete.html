{% extends 'base.html' %}
{% block title %}Delete Client — Invoicr{% endblock %}
{% block page_title %}Delete Client{% endblock %}

{% block content %}
<div class="max-w-md bg-white rounded-xl border border-gray-200 p-6">
  <p class="text-sm text-gray-700 mb-6">
    Are you sure you want to delete <strong>{{ client.name }}</strong>?
    This cannot be undone.
  </p>
  <form method="post" class="flex gap-3">
    {% csrf_token %}
    <button type="submit"
            class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-red-700">
      Yes, delete
    </button>
    <a href="{% url 'client_list' %}"
       class="px-4 py-2 rounded-lg text-sm text-gray-600 border border-gray-300 hover:bg-gray-50">
      Cancel
    </a>
  </form>
</div>
{% endblock %}
